# Netlify configuration — static HTML site, no build step.
# The pages are plain HTML files, so Netlify just publishes them as-is.

[build]
  # Publish the repository root (where the .html files live).
  publish = "."

# Netlify's "Pretty URLs" (on by default) means:
#   direct.html  is served at  /direct
#   story.html   is served at  /story
#   index.html   is served at  /
# No redirect rules are needed for this multi-page site.
