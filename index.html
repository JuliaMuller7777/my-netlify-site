<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Netlify Site</title>
  <meta name="description" content="A starter static site deployed from GitHub to Netlify." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="card">
    <div class="badge">Live on Netlify</div>
    <h1>It works! 🚀</h1>
    <p>
      This site is hosted on <strong>Netlify</strong> and deployed straight
      from a <strong>GitHub</strong> repository. Edit the files, push your
      changes, and Netlify rebuilds automatically.
    </p>

    <div class="clock" id="clock">--:--:--</div>

    <button id="themeBtn" type="button">Toggle dark mode</button>

    <footer>
      <p>Edit <code>index.html</code>, <code>css/style.css</code>, and
      <code>js/script.js</code> to make this site your own.</p>
    </footer>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
